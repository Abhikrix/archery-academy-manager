<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="ARCOS ARCHERY ACADEMY management dashboard for students, attendance, fees, reports, and role-based operations."
    />
    <meta name="theme-color" content="#090909" />
    <title>ARCOS ARCHERY ACADEMY Manager</title>
    <script>
      (() => {
        let storedTheme = "dark";
        try {
          storedTheme = localStorage.getItem("arcos-theme");
        } catch {
          storedTheme = "dark";
        }
        const theme = storedTheme === "light" ? "light" : "dark";
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
        document
          .querySelector('meta[name="theme-color"]')
          ?.setAttribute("content", theme === "light" ? "#f7f8fb" : "#090909");
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
